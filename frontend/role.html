<!DOCTYPE html>
<html>

<head>
    <title>Healthcare System</title>

    <style>

        body{
            font-family:Arial;
            background:#e6f7ff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 0 15px gray;
            text-align:center;
            width:350px;
        }

        h1{
            color:#0077b6;
        }

        button{
            width:200px;
            padding:12px;
            margin:15px;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            color:white;
        }

        .doctor{
            background:#0077b6;
        }

        .patient{
            background:#00b894;
        }

        button:hover{
            opacity:0.9;
        }

        /* CHATBOT */

        .chatbot-btn{
            position:fixed;
            bottom:20px;
            right:20px;
            background:#0077b6;
            color:white;
            border:none;
            width:60px;
            height:60px;
            border-radius:50%;
            font-size:28px;
            cursor:pointer;
            box-shadow:0 0 10px gray;
        }

        .chatbot{
            position:fixed;
            bottom:90px;
            right:20px;
            width:320px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 15px gray;
            display:none;
            overflow:hidden;
        }

        .chat-header{
            background:#0077b6;
            color:white;
            padding:15px;
            text-align:center;
            font-weight:bold;
        }

        .chat-box{
            height:300px;
            overflow-y:auto;
            padding:10px;
            background:#f5f5f5;
        }

        .message{
            padding:10px;
            margin:8px 0;
            border-radius:8px;
            max-width:80%;
        }

        .user{
            background:#cce5ff;
            margin-left:auto;
        }

        .bot{
            background:#e2e2e2;
        }

        .chat-input{
            display:flex;
            border-top:1px solid #ccc;
        }

        .chat-input input{
            flex:1;
            padding:10px;
            border:none;
            outline:none;
        }

        .chat-input button{
            width:80px;
            margin:0;
            border-radius:0;
            background:#0077b6;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Healthcare Management System</h1>

        <h2>Select Login Type</h2>

        <button class="doctor" onclick="goDoctor()">
            Doctor Side
        </button>

        <br>

        <button class="patient" onclick="goPatient()">
            Patient Side
        </button>

    </div>

    <!-- CHATBOT BUTTON -->

    <button class="chatbot-btn" onclick="toggleChat()">
        💬
    </button>

    <!-- CHATBOT -->

    <div class="chatbot" id="chatbot">

        <div class="chat-header">
            Health Assistant
        </div>

        <div class="chat-box" id="chatBox">

            <div class="message bot">
                Hello 👋 How can I help you?
            </div>

        </div>

        <div class="chat-input">

            <input
                type="text"
                id="userInput"
                placeholder="Type message..."
            >

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

    <script>

        function goDoctor(){

            window.location.href =
            "docdashboard.html";

        }

        function goPatient(){

            window.location.href =
            "dashboard.html";

        }

        // CHATBOT OPEN/CLOSE

        function toggleChat(){

            let chatbot =
            document.getElementById("chatbot");

            if(chatbot.style.display === "block"){
                chatbot.style.display = "none";
            }
            else{
                chatbot.style.display = "block";
            }

        }

        // SEND MESSAGE

        function sendMessage(){

            let input =
            document.getElementById("userInput");

            let message =
            input.value.trim();

            if(message === "") return;

            let chatBox =
            document.getElementById("chatBox");

            // USER MESSAGE

            let userMsg =
            document.createElement("div");

            userMsg.classList.add(
                "message",
                "user"
            );

            userMsg.innerText = message;

            chatBox.appendChild(userMsg);

            // BOT MESSAGE

            let botMsg =
            document.createElement("div");

            botMsg.classList.add(
                "message",
                "bot"
            );

            let reply = "";

            if(message.toLowerCase().includes("fever")){

                reply =
                "Drink water and take proper rest.";

            }
            else if(message.toLowerCase().includes("headache")){

                reply =
                "Please avoid stress and stay hydrated.";

            }
            else if(message.toLowerCase().includes("appointment")){

                reply =
                "You can book appointments from Patient Dashboard.";

            }
            else if(message.toLowerCase().includes("doctor")){

                reply =
                "Doctors are available from 9 AM to 6 PM.";

            }
            else{

                reply =
                "Sorry, I am still learning.";

            }

            setTimeout(() => {

                botMsg.innerText = reply;

                chatBox.appendChild(botMsg);

                chatBox.scrollTop =
                chatBox.scrollHeight;

            }, 500);

            input.value = "";

        }

    </script>

</body>
</html>
